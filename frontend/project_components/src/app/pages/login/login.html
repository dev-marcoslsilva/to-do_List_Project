    <div class="div_login">
      <div class="stilization_dots" id="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <h1>Seja bem vindo de volta!</h1>

          <input
            formControlName="login"
            type="email"
            name="login"
            id="login_input"
            placeholder="Digite seu login"
          />
          <input
            formControlName="password"
            type="password"
            name="password"
            id="password_input"
            placeholder="Digite sua senha"
          />

          <button type="submit" [disabled]="loginForm.invalid" id="login_button">Entrar</button>

          <div class="register_and_password">
            <p>Não tem uma conta ainda? <a href="/register" class="links_login">Cadastre-se!</a></p>
            <p>esqueceu a senha? <a href="/newPassword" class="links_login">redefinir senha</a></p>
          </div>
        
      </form>

      <h6>Created by: Marcos Leite</h6>
    </div>
