<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Dashboard Taks</title>
  </head>
  <body>
    <header>
        <div class="divTitle">
            <h3>Olá </h3> <h3 id="Saudation"> Clark kent</h3>
        </div>
        <div class="divTitle">
            <h6>Hoje é: </h6> <h6 id="currentDate">20/02/2026</h6>
        </div>
    </header>

    <!-- Nesta div, estará quase todo o site -->
    <div class="main_container">
      <!-- esta div represntará a barra lateral do site, conetndo todas as tarefas -->
      <div id="sideBar">

      </div>

      <!-- aqui, se localiza a barra de pesquisa do site, onde se pode verificar uma tarefa -->

      <div class="search_bar_div">
        <input type="text" name="" placeholder="Encontre uma tarefa..." id="searchBar">
        <button id="btnSerach"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>

      <!-- Esta div conterá todo o lado direito da aplicação, de forma a deixar o meio livre -->

      <div>
        <!-- Esta div conterá as tarefas especiais -->
         <div id="specialTasks">

         </div>

         <!-- Aqui, o botão para inserir uma nova tarefas -->

         <button></button>

         
         <div>
             <!-- Finalmente, a próxima tarefa do dia! -->
             <div id="nextTask">
    
             </div>
             <!-- Uma div para guardar os botões de pular tarefa ou conclui-la -->
             <div>

             </div>
        </div>
      </div>
    </div>
  </body>
</html>
